<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoodFlow – Дізнайся свій настрій</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/svg+xml" href="/moodflow-react/favicon.svg" />
    <!-- PWA -->
    <link rel="apple-touch-icon" href="/moodflow/pwa-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MoodFlow" />
    <meta name="theme-color" content="#6c4ff6" />
  </head>
  <body>
    <script>
      (function() {
        try {
          const storageKey = 'moodflow-storage';
          const json = localStorage.getItem(storageKey);
          if (json) {
            const parsed = JSON.parse(json);
            const mood = parsed.state && parsed.state.mood;
            if (mood) {
              document.documentElement.setAttribute('data-theme', mood);
            }
          }
        } catch (e) {}
      })();
    </script>

    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
